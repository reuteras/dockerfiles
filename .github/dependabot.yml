---
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/biodiff"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      package-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker"
    directory: "/container-attack-navigator"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      package-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker"
    directory: "/flightsim"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      package-deps:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/fq"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      package-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker"
    directory: "/hfinger"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      package-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker" # zizmor: ignore[dependabot-cooldown]
    directory: "/marimo"
    schedule:
      interval: "weekly"
    # cooldown omitted: Dependabot crashes (DockerRegistry2::NotFound) when
    # applying cooldown to python:3.14-bookworm due to a Docker Hub blob 404
    groups:
      package-deps:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/nDPI"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      package-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker"
    directory: "/nginx"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      docker-nginx-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker"
    directory: "/snort2suricata"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      docker-snort-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "docker"
    directory: "/webdav"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      docker-webdav-deps:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/zeek"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      docker-zeek-deps:
        patterns:
          - "*"
 
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions-deps:
        patterns:
          - "*"
